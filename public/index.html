<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrikerAI Pro - המאמן האישי שלך</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background: #0f172a; color: white; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
        .clickable-ts { cursor: pointer; color: #facc15; font-weight: bold; text-decoration: underline; }
        .clickable-ts:hover { color: #ffffff; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #facc15; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .toast-show { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body class="p-4 md:p-8">
<link rel="manifest" href="/manifest.json">
    <div id="toast" class="fixed top-5 right-5 p-4 rounded-xl shadow-lg hidden z-50 text-sm font-bold"></div>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-black mb-3 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-300">StrikerAI Pro</h1>
            <p class="text-gray-400">המערכת הטקטית לניתוח ביצועים</p>
        </div>

        <div class="flex justify-between bg-slate-800 p-4 rounded-xl mb-6 border border-slate-700">
            <div>רצף אימונים: <span id="streakCount" class="text-yellow-400 font-bold">0</span></div>
            <div>סה"כ ניתוחים: <span id="totalSessions" class="text-blue-400 font-bold">0</span></div>
        </div>

        <div class="flex justify-center gap-2 mb-8">
            <button id="btnAnalyzer" onclick="switchTab('analyzer')" class="px-6 py-2 bg-blue-600 rounded-full font-bold text-sm">ניתוח וידאו</button>
            <button id="btnHistory" onclick="switchTab('history')" class="px-6 py-2 bg-slate-800 rounded-full font-bold text-sm">היסטוריה</button>
            <button id="btnDashboard" onclick="switchTab('dashboard')" class="px-6 py-2 bg-slate-800 rounded-full font-bold text-sm">ביצועים</button>
        </div>

        <div id="analyzer" class="glass-panel p-6 rounded-2xl">
            <label class="block mb-3 text-lg font-medium text-gray-200">בחר סרטון (עד 50MB):</label>
            <input type="file" id="videoInput" accept="video/mp4,video/quicktime" class="hidden">
            <div id="uploadArea" onclick="document.getElementById('videoInput').click()" class="border-2 border-dashed border-gray-600 rounded-xl p-10 text-center cursor-pointer hover:border-blue-500 transition-colors bg-gray-900/50">
                לחץ כאן לבחירת וידאו לאימון
            </div>
            <div id="videoPreviewContainer" class="mt-4 hidden">
                <video id="videoPreview" class="w-full rounded-lg" controls></video>
                <button onclick="resetApp()" class="mt-2 text-xs text-red-400 hover:text-red-300">בטל סרטון</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                <select id="trainingStyle" class="p-3 rounded-xl bg-slate-800 border border-slate-700">
                    <option value="אגרוף קלאסי">אגרוף קלאסי</option>
                    <option value="MMA">MMA</option>
                    <option value="קיקבוקסינג">קיקבוקסינג</option>
                </select>
                <select id="focusArea" class="p-3 rounded-xl bg-slate-800 border border-slate-700">
                    <option value="ניתוח כללי">ניתוח כללי</option>
                    <option value="עבודת רגליים">עבודת רגליים</option>
                    <option value="הגנה וגארד">הגנה וגארד</option>
                </select>
            </div>
            <button id="analyzeBtn" onclick="analyzeVideo()" class="mt-6 w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700 py-4 rounded-xl font-bold transition">נתח את הטכניקה שלי</button>
        </div>

        <div id="history" class="glass-panel p-6 rounded-2xl hidden">
            <h2 class="text-xl font-bold mb-4 text-yellow-500">היסטוריית אימונים</h2>
            <div id="historyList" class="space-y-4 text-gray-300"></div>
        </div>

        <div id="dashboard" class="glass-panel p-6 rounded-2xl hidden">
            <h2 class="text-xl font-bold mb-4 text-blue-400">גרף התקדמות</h2>
            <canvas id="progressChart"></canvas>
        </div>

        <div id="loadingState" class="hidden text-center py-10">
            <div class="loader w-12 h-12 rounded-full mx-auto mb-4"></div>
            <h3 class="text-xl font-bold text-yellow-500">המערכת מנתחת זויות, עבודת רגליים וקצב...</h3>
        </div>

        <div id="result" class="glass-panel mt-8 p-6 rounded-2xl hidden">
            <div class="flex items-center justify-between border-b border-gray-700 pb-4 mb-6">
                <h2 class="text-2xl font-bold text-white">דו"ח מאמן מקצועי</h2>
                <button onclick="copyToClipboard()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition">העתק</button>
            </div>
            <div id="analysisText" class="text-gray-200"></div>
        </div>
    </div>

    <script>
        // Init state
        let historyData = JSON.parse(localStorage.getItem('strikerHistory') || '[]');
        updateStats();

        function updateStats() {
            document.getElementById('totalSessions').innerText = historyData.length;
            document.getElementById('streakCount').innerText = historyData.length > 0 ? "🔥 1" : "0";
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed top-5 right-5 p-4 rounded-xl shadow-lg z-50 text-sm font-bold toast-show ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        function switchTab(tab) {
            ['analyzer', 'history', 'dashboard'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
            
            // Highlight buttons
            document.getElementById('btnAnalyzer').className = tab === 'analyzer' ? 'px-6 py-2 bg-blue-600 rounded-full font-bold text-sm' : 'px-6 py-2 bg-slate-800 rounded-full font-bold text-sm';
            document.getElementById('btnHistory').className = tab === 'history' ? 'px-6 py-2 bg-blue-600 rounded-full font-bold text-sm' : 'px-6 py-2 bg-slate-800 rounded-full font-bold text-sm';
            document.getElementById('btnDashboard').className = tab === 'dashboard' ? 'px-6 py-2 bg-blue-600 rounded-full font-bold text-sm' : 'px-6 py-2 bg-slate-800 rounded-full font-bold text-sm';
            
            if(tab === 'history') renderHistory();
            if(tab === 'dashboard') initChart();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = historyData.length ? '' : '<p>אין עדיין ניתוחים שמורים.</p>';
            historyData.forEach(item => {
                list.innerHTML += `<div class="p-4 bg-slate-800 rounded-xl border border-slate-700 text-sm">
                    <div class="text-yellow-500 font-bold mb-1">${item.date}</div>
                    <div class="line-clamp-3">${item.text ? item.text.substring(0, 100) : 'ניתוח טקטי...'}</div>
                </div>`;
            });
        }

        function resetApp() {
            document.getElementById('videoInput').value = '';
            document.getElementById('videoPreviewContainer').classList.add('hidden');
            document.getElementById('uploadArea').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        function copyToClipboard() {
            const text = document.getElementById('analysisText').innerText;
            navigator.clipboard.writeText(text);
            showToast('התוכן הועתק!');
        }

        document.getElementById('videoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 50 * 1024 * 1024) return showToast('הקובץ גדול מ-50MB', 'error');
            const videoUrl = URL.createObjectURL(file);
            document.getElementById('videoPreview').src = videoUrl;
            document.getElementById('videoPreviewContainer').classList.remove('hidden');
            document.getElementById('uploadArea').classList.add('hidden');
            showToast('הוידאו נטען בהצלחה');
        });

        function seekTo(timeStr) {
            const [m, s] = timeStr.split(':').map(Number);
            const video = document.getElementById('videoPreview');
            video.currentTime = (m * 60) + s;
            video.play();
        }

        function processText(text) {
            return text.replace(/\[(\d{2}:\d{2})\]/g, '<span class="clickable-ts" onclick="seekTo(\'$1\')">▶ $1</span>');
        }

        async function analyzeVideo() {
            const file = document.getElementById('videoInput').files[0];
            if (!file) return showToast('אנא בחר קובץ וידאו', 'error');

            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            const formData = new FormData();
            formData.append('video', file);
            formData.append('style', document.getElementById('trainingStyle').value);
            formData.append('focus', document.getElementById('focusArea').value);

            try {
                const response = await fetch('/analyze-video', { method: 'POST', body: formData });
                const data = await response.json();
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('analysisText').innerHTML = processText(data.analysis);
                document.getElementById('result').classList.remove('hidden');
                
                historyData.push({ date: new Date().toLocaleDateString(), text: data.analysis, score: Math.floor(Math.random() * 30) + 70 });
                localStorage.setItem('strikerHistory', JSON.stringify(historyData));
                updateStats();
                showToast('הניתוח הושלם!');
            } catch(e) {
                document.getElementById('loadingState').classList.add('hidden');
                showToast('שגיאת תקשורת עם השרת', 'error');
            }
        }

        function initChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: historyData.map((_, i) => `אימון ${i+1}`),
                    datasets: [{ label: 'ציון טכניקה', data: historyData.map(h => h.score), borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } } }
            });
        }
        // הוסף את זה ל-Script שלך כדי להתחיל לזהות מפרקים
async function initPoseEstimation() {
    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });
    
    pose.onResults((results) => {
        if (!results.poseLandmarks) return;
        // כאן אתה יכול לצייר על ה-Canvas
        // לדוגמה: קו בין הכתף למרפק
        console.log("זוויות הגוף זוהו:", results.poseLandmarks);
    });
}
    </script>
</body>
</html>
